<script>
// Máscara CPF
document.getElementById('cpf').addEventListener('input', function(e) {
  let value = e.target.value.replace(/\D/g, '');
  if (value.length > 11) value = value.slice(0, 11);
  value = value.replace(/(\d{3})(\d)/, '$1.$2');
  value = value.replace(/(\d{3})(\d)/, '$1.$2');
  value = value.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
  e.target.value = value;
});

// Máscara Telefone
document.getElementById('telefone').addEventListener('input', function(e) {
  let value = e.target.value.replace(/\D/g, '');
  if (value.length > 11) value = value.slice(0, 11);
  if (value.length > 10) {
    value = value.replace(/^(\d{2})(\d{5})(\d{4})$/, '($1) $2-$3');
  } else {
    value = value.replace(/^(\d{2})(\d{4})(\d{0,4})$/, '($1) $2-$3');
  }
  e.target.value = value;
});

(function(){
  const cpfEl = document.getElementById('cpf');
  const telEl = document.getElementById('telefone');

  function formatCPF(v){
    const d = v.replace(/\D/g,'').slice(0,11);
    const p1 = d.slice(0,3);
    const p2 = d.slice(3,6);
    const p3 = d.slice(6,9);
    const p4 = d.slice(9,11);
    let out = p1;
    if(p2) out += '.' + p2;
    if(p3) out += '.' + p3;
    if(p4) out += '-' + p4;
    return out;
  }

  function formatPhone(v){
    const d = v.replace(/\D/g,'').slice(0,11);
    if(d.length <= 10){
      const m = d.match(/^(\d{0,2})(\d{0,4})(\d{0,4})$/);
      return (m[1]?`(${m[1]}) `:'') + (m[2]?m[2]:'') + (m[3]?'-'+m[3]:'');
    } else {
      const m = d.match(/^(\d{0,2})(\d{0,5})(\d{0,4})$/);
      return (m[1]?`(${m[1]}) `:'') + (m[2]?m[2]:'') + (m[3]?'-'+m[3]:'');
    }
  }

  function setCaretFromDigitIndex(el, digitIndex){
    const v = el.value;
    let digits = 0;
    for(let i=0;i<v.length;i++){
      if(/\d/.test(v[i])) digits++;
      if(digits >= digitIndex){
        try { el.setSelectionRange(i+1, i+1); } catch(e){}
        return;
      }
    }
    try { el.setSelectionRange(v.length, v.length); } catch(e){}
  }

  function onInputGeneric(el, formatter){
    return function(e){
      const selDigits = (el.value.slice(0, el.selectionStart).match(/\d/g) || []).length;
      el.value = formatter(el.value);
      setCaretFromDigitIndex(el, selDigits);
    };
  }

  if(cpfEl){
    cpfEl.addEventListener('input', onInputGeneric(cpfEl, formatCPF));
    cpfEl.addEventListener('paste', function(e){
      e.preventDefault();
      const text = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g,'');
      cpfEl.value = formatCPF(text);
    });
  }

  if(telEl){
    telEl.addEventListener('input', onInputGeneric(telEl, formatPhone));
    telEl.addEventListener('paste', function(e){
      e.preventDefault();
      const text = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g,'');
      telEl.value = formatPhone(text);
    });
  }
})();

(function(){
  const cepEl = document.getElementById('cep');
  if(!cepEl) return;
  cepEl.addEventListener('input', function(e){
    let v = e.target.value.replace(/\D/g,'').slice(0,8);
    if(v.length > 5) v = v.replace(/^(\d{5})(\d{1,3})$/, '$1-$2');
    e.target.value = v;
  });
  cepEl.addEventListener('paste', function(e){
    e.preventDefault();
    const text = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g,'').slice(0,8);
    cepEl.value = text.replace(/^(\d{5})(\d{1,3})$/, '$1-$2');
  });
})();

// coloca a página atual como parâmetro `return`
(function(){
  const a = document.getElementById('link-termos-cliente');
  const ret = encodeURIComponent(location.pathname + location.search + location.hash);
  a.href = `termos.html?return=${ret}`;
})();


</script>
