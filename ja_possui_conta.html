<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Já possui conta (Cliente) | Trampay</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600;800;900&family=Zain:wght@300;400;700;900&display=swap" rel="stylesheet">

  <style>
    :root{ --navy:#02001b; --ink:#00185c; --ink-soft:#e5edff; --brand-grad: linear-gradient(90deg,#000a25fd,#000c2c); }
    *{ box-sizing:border-box; }
    html{ scroll-behavior:smooth; }
    body{
      margin:0; min-height:100svh; color:var(--navy);
      font-family:"Inter", system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial;
      background:
        radial-gradient(1200px 600px at 80% -20%, #1b2a8a14, transparent 60%),
        radial-gradient(1100px 700px at -10% 110%, #3a3acb12, transparent 60%),
        #f9fbff;
      display:grid; grid-template-rows:auto 1fr auto;
    }

    /* HERO */
    .hero-wrap{
      padding: clamp(54px, 7vw, 96px) 20px 28px;
      display:grid; place-items:center; text-align:center;
      background:
        linear-gradient(rgba(0,0,0,.55), rgba(0,0,0,.55)),
        url('aboutbg.png') center/cover no-repeat;
      color:#f4f4f4; border-bottom: 1px solid #00000022;
      position: relative; isolation: isolate;
    }
    .hero-wrap::after{ content:""; position:absolute; inset:0; z-index:-1; backdrop-filter: blur(.6px); }
    .hero{ width:min(980px, 92vw); display:grid; gap:8px; }
    .hero h1{
      font-family:"Bebas Neue", sans-serif; margin:0;
      font-size: clamp(38px, 6.2vw, 68px);
      background: linear-gradient(90deg,#ffffff,#a3ddff);
      -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; color:transparent;
      letter-spacing:.8px;
    }
    .hero p{ margin:0; font-family:"Zain", sans-serif; font-size: clamp(16px, 2.2vw, 19px); color: var(--ink-soft); }

    /* CARD */
    .shell{ display:grid; place-items:center; padding: 26px 16px 18px; }
    .card-auth{
      width:min(520px, 92vw);
      border-radius:22px; border:1px solid rgba(255,255,255,.35);
      background: linear-gradient(155deg, rgba(255,255,255,.92), rgba(255,255,255,.66));
      box-shadow: 0 10px 34px rgba(0,0,0,.18), inset 0 1px 0 rgba(255,255,255,.35);
      overflow:hidden;
    }
    .card-head{ padding: 18px 20px 10px; background: var(--brand-grad); color:#fff; text-align:center; }
    .card-head h2{ margin:0; font-family:"Bebas Neue"; font-size: clamp(22px, 4vw, 30px); letter-spacing:.6px; }
    .card-sub{ font-family:"Zain"; font-size: 1rem; opacity:.95; margin-top:2px; }

    .card-body{ padding: 18px 18px 8px; }
    .form-label{ font-family:"Zain"; color:var(--ink); margin-bottom:6px; }
    .form-control{
      border:none; border-bottom:2px solid #d6dbf0; border-radius:10px 10px 0 0;
      padding:12px 10px; background: #fff; outline: none; box-shadow: none;
    }
    .form-control:focus{ border-color: var(--ink); }

    .input-with-icon{ position:relative; }
    .input-with-icon i{ position:absolute; right:10px; top:50%; transform:translateY(-50%); font-size:18px; color:#7a86b6; }

    .btn-brand{
      display:inline-flex; align-items:center; justify-content:center; gap:8px;
      width:100%; padding:14px 16px; border:none; border-radius:16px; cursor:pointer;
      font-size:1.02rem; font-weight:800; font-family:"Zain"; color:#fff;
      background: var(--brand-grad); box-shadow: 0 10px 24px rgba(0,0,0,.18);
      transition: transform .15s ease, filter .15s ease;
    }
    .btn-brand:hover{ filter:brightness(1.05); transform: translateY(-2px); }

    .links{ display:flex; justify-content:center; gap:12px; flex-wrap:wrap; padding:12px 2px 8px; font-family:"Zain"; }
    .links a{ text-decoration:none; color:#0d6efd; }
    .links a:hover{ text-decoration:underline; }

    footer{ width:100%; padding:22px 12px 26px; text-align:center; color:#3c4066; font-size:.95rem; }

    ::-webkit-scrollbar{ width:7px; } ::-webkit-scrollbar-track{ background:#ddd; } ::-webkit-scrollbar-thumb{ background:var(--navy); border-radius:50px; }
  </style>
</head>
<body>

  <!-- HERO -->
  <section class="hero-wrap">
    <div class="hero">
      <h1>Você já possui uma conta</h1>
      <p id="heroMsg">Identificamos um cadastro de cliente com seus dados. Faça login para continuar.</p>
    </div>
  </section>

  <!-- CARD -->
  <main class="shell">
    <div class="card-auth">
      <div class="card-head">
        <h2>Entrar como Cliente</h2>
        <div class="card-sub" id="subMsg">Use seu e-mail e senha para acessar.</div>
      </div>

      <div class="card-body">
        <!-- IMPORTANTE: agora postamos direto no PHP do cliente -->
        <form action="ja_possui_conta.php" method="POST" id="formLogin" autocomplete="on">
          <div class="mb-3">
            <label class="form-label" for="email">E-mail</label>
            <div class="input-with-icon">
              <input class="form-control" id="email" name="email" type="email" placeholder="seu@email.com" required>
              <i class="bi bi-at"></i>
            </div>
          </div>

          <div class="mb-2">
            <label class="form-label" for="senha">Senha</label>
            <div class="input-with-icon">
              <input class="form-control" id="senha" name="senha" type="password" placeholder="••••••••" required>
              <i class="bi bi-shield-lock"></i>
            </div>
          </div>

          <button type="submit" class="btn-brand mt-2">
            <i class="bi bi-box-arrow-in-right"></i> Entrar
          </button>

          <div class="links mt-2">
            <a href="esqueci_senha_cliente.html"><i class="bi bi-key"></i> Esqueci minha senha</a>
            <a href="cadcliente.html"><i class="bi bi-person-plus"></i> Criar conta</a>
          </div>
        </form>
      </div>
    </div>
  </main>

  <footer>&copy; 2025 Trampay — Acesso do cliente</footer>

  <script>
    // mensagem dinâmica (?motivo=cpf|email|telefone|id)
    const params = new URLSearchParams(window.location.search);
    const motivo = (params.get('motivo') || '').toLowerCase();
    const heroMsg = document.getElementById('heroMsg');
    const subMsg  = document.getElementById('subMsg');
    if (motivo && heroMsg && subMsg) {
      const map = {
        cpf:     'Já existe um cadastro de cliente com este CPF.',
        email:   'Já existe um cadastro de cliente com este e-mail.',
        telefone:'Já existe um cadastro de cliente com este telefone.',
        id:      'Já existe um cadastro de cliente com este ID.'
      };
      const found = map[motivo] || 'Identificamos um cadastro de cliente com seus dados.';
      heroMsg.textContent = found + ' Faça login para continuar.';
      subMsg.textContent  = 'Se esqueceu a senha, recupere o acesso abaixo.';
    }
  </script>
</body>
</html>
