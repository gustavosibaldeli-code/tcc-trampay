<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Esqueci minha senha | Trampay</title>

  <!-- Bootstrap / Ícones / Fontes -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600;800;900&family=Zain:wght@300;400;700;900&display=swap" rel="stylesheet">

  <style>
    :root{
      --navy:#02001b;
      --ink:#00185c;
      --ink-soft:#e5edff;
      --brand-grad: linear-gradient(90deg,#000a25fd,#000c2c);
      --ok:#1f9958; --err:#bb2d3b;
    }

    *{ box-sizing: border-box; }
    html{ scroll-behavior:smooth; }
    body{
      margin:0; min-height:100svh; color:var(--navy);
      font-family: "Inter", system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial;
      background:
        radial-gradient(1200px 600px at 80% -20%, #1b2a8a14, transparent 60%),
        radial-gradient(1100px 700px at -10% 110%, #3a3acb12, transparent 60%),
        #f9fbff;
      display:grid; grid-template-rows:auto 1fr auto;
    }

    /* ===== HERO enxuta ===== */
    .hero-wrap{
      padding: clamp(54px, 7vw, 96px) 20px 28px;
      display:grid; place-items:center; text-align:center;
      background:
        linear-gradient(rgba(0,0,0,.55), rgba(0,0,0,.55)),
        url('aboutbg.png') center/cover no-repeat;
      color:#f4f4f4; border-bottom: 1px solid #00000022;
      position: relative; isolation: isolate;
    }
    .hero-wrap::after{ content:""; position:absolute; inset:0; z-index:-1; backdrop-filter: blur(.6px); }
    .hero{ width:min(980px, 92vw); display:grid; gap:8px; }
    .hero h1{
      font-family:"Bebas Neue", sans-serif;
      font-size: clamp(38px, 6.2vw, 68px);
      margin:0;
      background: linear-gradient(90deg,#ffffff,#a3ddff);
      -webkit-background-clip:text; background-clip:text;
      -webkit-text-fill-color:transparent; color:transparent;
      letter-spacing:.8px;
    }
    .hero p{
      margin:0; font-family:"Zain", sans-serif;
      font-size: clamp(16px, 2.2vw, 19px); color: var(--ink-soft);
    }

    /* ===== Card (glass) ===== */
    .shell{ display:grid; place-items:center; padding: 26px 16px 18px; }
    .card-auth{
      width:min(520px, 92vw);
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,.35);
      background: linear-gradient(155deg, rgba(255,255,255,.92), rgba(255,255,255,.66));
      box-shadow: 0 10px 34px rgba(0,0,0,.18), inset 0 1px 0 rgba(255,255,255,.35);
      overflow: hidden;
    }
    .card-head{
      padding: 18px 20px 10px;
      background: var(--brand-grad);
      color:#fff; text-align:center;
    }
    .card-head h2{
      margin:0; font-family:"Bebas Neue"; font-size: clamp(22px, 4vw, 30px);
      letter-spacing:.6px;
    }
    .card-sub{ font-family:"Zain"; font-size: 1rem; opacity:.95; margin-top:2px; }

    .card-body{ padding: 18px 18px 8px; }
    .form-label{ font-family:"Zain"; color:var(--ink); margin-bottom:6px; }
    .form-control{
      border:none; border-bottom:2px solid #d6dbf0; border-radius:10px 10px 0 0;
      padding:12px 10px; background: #fff; outline: none; box-shadow: none;
    }
    .form-control:focus{ border-color: var(--ink); }

    .btn-brand{
      display:inline-flex; align-items:center; justify-content:center; gap:8px;
      width:100%; padding:14px 16px; border:none; border-radius:16px; cursor:pointer;
      font-size:1.02rem; font-weight:800; font-family:"Zain"; color:#fff;
      background: var(--brand-grad);
      box-shadow: 0 10px 24px rgba(0,0,0,.18);
      transition: transform .15s ease, filter .15s ease;
    }
    .btn-brand:hover{ filter:brightness(1.05); transform: translateY(-2px); }
    .btn-brand[disabled]{ opacity:.7; cursor:not-allowed; }

    .links{
      display:flex; justify-content:center; gap:12px; flex-wrap:wrap;
      padding:12px 2px 8px; font-family:"Zain";
    }
    .links a{ text-decoration:none; color:#0d6efd; }
    .links a:hover{ text-decoration:underline; }

    .msg{
      margin-top:14px; border-radius:12px; padding:12px 12px; display:none;
      font-family:"Zain"; font-weight:700;
      border:1px solid transparent;
    }
    .msg.ok{ display:flex; align-items:center; gap:10px; color:#0a3622; background:#d1e7dd; border-color:#a3cfbb; }
    .msg.err{ display:flex; align-items:center; gap:10px; color:#58151c; background:#f8d7da; border-color:#f1aeb5; }

    footer{ width:100%; padding:22px 12px 26px; text-align:center; color:#3c4066; font-size:.95rem; }

    /* Scrollbar */
    ::-webkit-scrollbar{ width:7px; } ::-webkit-scrollbar-track{ background:#ddd; } ::-webkit-scrollbar-thumb{ background:var(--navy); border-radius:50px; }
  </style>
</head>
<body>

  <!-- HERO -->
  <section class="hero-wrap">
    <div class="hero">
      <h1>Recuperar senha</h1>
      <p>Informe seu e-mail para receber o link de redefinição.</p>
    </div>
  </section>

  <!-- CARD -->
  <main class="shell">
    <div class="card-auth">
      <div class="card-head">
        <h2>Esqueci minha senha</h2>
        <div class="card-sub">Vamos te enviar um e-mail com instruções.</div>
      </div>

      <div class="card-body">
        <form id="formRecupera" autocomplete="on">
          <label for="email" class="form-label">E-mail</label>
          <input class="form-control" type="email" name="email" id="email" placeholder="seu@email.com" required>
          <button id="btnEnviar" type="submit" class="btn-brand mt-3">
            <i class="bi bi-envelope-paper"></i> Enviar link
          </button>
          <div id="mensagem" class="msg" role="status" aria-live="polite"></div>

          <div class="links">
            <a href="ja_possui_conta_funcionario.html"><i class="bi bi-box-arrow-left"></i> Voltar ao login</a>
            <a href="cadfuncionario.html"><i class="bi bi-person-plus"></i> Criar conta</a>
          </div>
        </form>
      </div>
    </div>
  </main>

  <footer>
    &copy; 2025 Trampay — Recuperação segura • tokens temporários
  </footer>

  <script>
    // Pré-preencher e-mail via ?email=
    (function(){
      const params = new URLSearchParams(window.location.search);
      const e = params.get('email');
      if(e){ document.getElementById('email').value = e; }
    })();

    const form = document.getElementById("formRecupera");
    const btn  = document.getElementById("btnEnviar");
    const msg  = document.getElementById("mensagem");
    const emailInput = document.getElementById("email");

    function setLoading(isLoading){
      if(isLoading){
        btn.setAttribute('disabled','disabled');
        btn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Enviando...';
      } else {
        btn.removeAttribute('disabled');
        btn.innerHTML = '<i class="bi bi-envelope-paper"></i> Enviar link';
      }
    }

    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      // Validação simples
      const email = emailInput.value.trim();
      if (!email) { showMsg(false, "Digite um e-mail válido."); return; }

      setLoading(true); showMsg(null, ""); // limpa
      try{
        const resp = await fetch("processa_esqueci_senha.php", {
          method: "POST",
          body: new FormData(form)
        });
        const text = await resp.text();

        if (text.trim().toLowerCase() === "sucesso") {
          showMsg(true, "E-mail enviado! Verifique sua caixa de entrada (e o spam).");
        } else {
          showMsg(false, "Não foi possível enviar. Confira o e-mail informado.");
        }
      }catch(_){
        showMsg(false, "Erro no sistema. Tente novamente em instantes.");
      }finally{
        setLoading(false);
      }
    });

    function showMsg(ok, text){
      if (ok === null){ msg.style.display = "none"; return; }
      msg.className = "msg " + (ok ? "ok" : "err");
      msg.innerHTML = (ok
        ? '<i class="bi bi-check-circle-fill"></i>'
        : '<i class="bi bi-exclamation-triangle-fill"></i>') + ' ' + text;
      msg.style.display = "flex";
    }
  </script>
</body>
</html>
